services:
  trumpornot:
    image: thibaldocker/trumpornot:latest
    ports:
      - "8080:8080"
    environment:
      - EXTENSION_API_KEY=${EXTENSION_API_KEY}
      - ADMIN_PAGE_KEY=${ADMIN_PAGE_KEY}
      - BETA_PAGE_KEY=${BETA_PAGE_KEY}
      - PORT=8080
    volumes:
      - ./backend/data.db:/app/backend/data.db  # Persist SQLite database
    restart: unless-stopped
