version: '3.8'

services:
  trumpornot:
    image: thibaldocker/trumpornot:latest
    ports:
      - "8080:8080"
    environment:
      - EXTENSION_API_KEY=your-secure-api-key-here
      - ADMIN_PAGE_KEY=your-admin-key-here
      - PORT=8080
    volumes:
      - ./backend/data.db:/app/data.db  # Persist SQLite database
    restart: unless-stopped